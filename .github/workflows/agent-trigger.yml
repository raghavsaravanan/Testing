name: Agent Trigger

on:
  issues:
    types: [labeled]

jobs:
  call-agent:
    if: github.event.label.name == 'agent-fix-this'
    uses: raghavsaravanan/Issue-to-PR-Autonomous-Agent/.github/workflows/agent.yml@main
    with:
      issue_number: ${{ github.event.issue.number }}
      issue_title: ${{ github.event.issue.title }}
      issue_body: ${{ github.event.issue.body }}
      